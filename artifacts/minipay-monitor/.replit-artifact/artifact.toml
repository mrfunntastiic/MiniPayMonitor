kind = "web"
previewPath = "/"
title = "MiniPay Monitor"
version = "1.0.0"
id = "artifacts/minipay-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19952

[services.development]
run = "pnpm --filter @workspace/minipay-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/minipay-monitor", "run", "build" ]
publicDir = "artifacts/minipay-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19952"
BASE_PATH = "/"
